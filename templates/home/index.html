<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <!-- You can fill this later -->
            <h1>Event Builder</h1>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section id="form-section">
            <h2>Submit a Form</h2>
            <form method="POST" action="">
                {{ form.hidden_tag() }}
                {% for field in form %}
                    <div class="form-group">
                        {{ field.label }}
                        {{ field(class="form-control") }}
                        {% if field.errors %}
                            <ul class="errors">
                                {% for error in field.errors %}
                                    <li>{{ error }}</li>
                                {% endfor %}
                            </ul>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <!-- Empty for now -->
        <p>&copy; 2026 Event Builder</p>
    </footer>
</body>
</html>
